</div>
<div>

</div>
<div>

<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 outline-none transition-all duration-200" id="password" placeholder="Minimal 8 karakter" type="password"/>
</div>
<button onclick="window.location.href='dashboard.html'" class="w-full bg-secondary-container text-on-secondary-container font-button text-button py-4 rounded-lg hover:bg-secondary-container/90 transition-colors duration-200 mt-2" type="button">
                        Daftar Sekarang
                    </button>
